server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /api/data {
        proxy_pass http://172.16.1.97:4000/data;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri /index.html;
    }
}